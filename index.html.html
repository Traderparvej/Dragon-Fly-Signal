<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUOTEX PREDICT V.I.P</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #04080f; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(16, 22, 34, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gold-gradient { background: linear-gradient(90deg, #f0b90b, #dca006); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .login-overlay { position: fixed; inset: 0; background: #04080f; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .signal-card { border-left: 4px solid transparent; transition: 0.3s; }
        .signal-up { border-left-color: #00ff88; background: rgba(0, 255, 136, 0.05); }
        .signal-down { border-left-color: #ff3333; background: rgba(255, 51, 51, 0.05); }
        .animate-pulse-slow { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="text-white">

    <!-- পাসওয়ার্ড প্রটেকশন স্ক্রিন -->
    <div id="loginOverlay" class="login-overlay">
        <div class="glass p-8 rounded-2xl w-96 text-center border-yellow-500/30 border">
            <h2 class="text-3xl font-bold gold-gradient mb-4">QUOTEX V.I.P</h2>
            <p class="text-gray-400 text-sm mb-6">Enter License Key to Access Premium Signals</p>
            <input type="password" id="passInput" placeholder="Enter Password" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-lg mb-4 text-center focus:outline-none focus:border-yellow-500">
            <button onclick="checkPass()" class="w-full bg-yellow-500 text-black font-bold py-3 rounded-lg hover:bg-yellow-400 transition">LOGIN ACCESS</button>
            <p class="mt-6 text-xs text-gray-500">Don't have a key? <br> 
                <a href="https://t.me/ITBD_Parvej" target="_blank" class="text-yellow-500 font-bold underline">Contact Admin (ITBD Parvej)</a>
            </p>
        </div>
    </div>

    <!-- মেইন ড্যাশবোর্ড (লগইন সফল হলে দেখাবে) -->
    <div id="mainDashboard" class="hidden h-screen flex flex-col">
        <!-- Navbar -->
        <nav class="glass p-4 flex justify-between items-center border-b border-white/5">
            <div class="flex items-center gap-2">
                <i class="fas fa-chart-line text-yellow-500 text-2xl"></i>
                <span class="text-xl font-black tracking-tighter gold-gradient">PREDICT V.I.P</span>
            </div>
            <div class="flex items-center gap-6">
                <div class="text-right">
                    <p class="text-[10px] text-gray-400 uppercase tracking-widest">Live Market Time</p>
                    <p id="liveClock" class="font-mono text-yellow-500">00:00:00</p>
                </div>
                <a href="https://t.me/ITBD_Parvej" target="_blank" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-full text-sm font-bold transition flex items-center gap-2">
                    <i class="fab fa-telegram"></i> SUPPORT
                </a>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="flex-1 flex overflow-hidden">
            <!-- Left: Live Chart -->
            <div class="flex-[3] border-r border-white/5 p-2">
                <div id="tradingview_widget" class="h-full w-full rounded-xl overflow-hidden"></div>
            </div>

            <!-- Right: Signals Panel -->
            <div class="flex-1 glass m-2 rounded-xl flex flex-col overflow-hidden border border-white/5">
                <div class="p-4 border-b border-white/5 bg-white/5 flex justify-between items-center">
                    <h3 class="font-bold text-sm uppercase tracking-widest"><i class="fas fa-bolt text-yellow-500 mr-2"></i>Live Signals</h3>
                    <span class="text-[10px] bg-green-500/20 text-green-400 px-2 py-1 rounded animate-pulse">ACTIVE</span>
                </div>
                
                <div id="signalContainer" class="flex-1 overflow-y-auto p-4 space-y-4">
                    <!-- সিগন্যাল এখানে আসবে -->
                </div>

                <div class="p-4 bg-yellow-500/5 border-t border-yellow-500/20">
                    <p class="text-[10px] text-center text-gray-400 italic">Trade Duration: 1 Minute (Wait for the exact time)</p>
                </div>
            </div>
        </main>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // পাসওয়ার্ড এনক্রিপটেড লজিক (125800)
        const _0xkey = [49, 50, 53, 56, 48, 48]; 

        function checkPass() {
            const input = document.getElementById('passInput').value;
            const inputCodes = Array.from(input).map(c => c.charCodeAt(0));
            
            if (JSON.stringify(inputCodes) === JSON.stringify(_0xkey)) {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainDashboard').classList.remove('hidden');
                initChart();
                startSignalEngine();
            } else {
                alert("Wrong License Key! Contact @ITBD_Parvej");
            }
        }

        // লাইভ ঘড়ি
        function updateClock() {
            const now = new Date();
            document.getElementById('liveClock').innerText = now.toLocaleTimeString('en-GB');
        }
        setInterval(updateClock, 1000);

        // ট্রেডিংভিউ চার্ট
        function initChart() {
            new TradingView.widget({
                "autosize": true,
                "symbol": "FX:EURUSD",
                "interval": "1",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "hide_side_toolbar": false,
                "allow_symbol_change": true,
                "container_id": "tradingview_widget"
            });
        }

        // সিগন্যাল ইঞ্জিন
        const pairs = ["EUR/USD", "GBP/USD", "USD/JPY", "AUD/USD", "EUR/JPY"];
        
        function generateSignal() {
            const pair = pairs[Math.floor(Math.random() * pairs.length)];
            const direction = Math.random() > 0.5 ? "UP" : "DOWN";
            const now = new Date();
            const signalTime = now.getHours().toString().padStart(2, '0') + ":" + 
                               now.getMinutes().toString().padStart(2, '0');

            const container = document.getElementById('signalContainer');
            const div = document.createElement('div');
            const typeClass = direction === "UP" ? "signal-up" : "signal-down";
            const icon = direction === "UP" ? "fa-arrow-trend-up text-green-400" : "fa-arrow-trend-down text-red-400";

            div.className = `signal-card ${typeClass} p-4 rounded-lg animate-fade-in`;
            div.innerHTML = `
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-xs text-gray-400 font-bold">${pair}</p>
                        <p class="text-xl font-black">${signalTime} <span class="text-sm text-gray-500 font-normal">Now</span></p>
                    </div>
                    <div class="text-right">
                        <p class="text-sm font-black ${direction === 'UP' ? 'text-green-400' : 'text-red-400'}">${direction}</p>
                        <i class="fas ${icon}"></i>
                    </div>
                </div>
                <div class="mt-2 flex justify-between items-center text-[10px]">
                    <span class="text-gray-500">EXPIRY: 1 MIN</span>
                    <span class="bg-white/10 px-2 py-0.5 rounded text-yellow-500 font-bold">ACCURACY 98%</span>
                </div>
            `;

            container.prepend(div);
            if (container.children.length > 5) container.lastChild.remove();
        }

        function startSignalEngine() {
            generateSignal(); // সাথে সাথে একটি সিগন্যাল
            setInterval(generateSignal, 60000); // প্রতি ১ মিনিটে নতুন সিগন্যাল
        }
    </script>
</body>
</html>
