<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRAGONFLY // ULTRA-PREMIUM TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #040608; --card: #0d1117; --accent: #3b82f6; --neon: #00f2fe; }
        body { background-color: var(--bg); font-family: 'Lexend', sans-serif; color: #f8fafc; margin: 0; overflow-x: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Premium Background Animation */
        .grid-bg {
            background-image: linear-gradient(rgba(59, 130, 246, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(59, 130, 246, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .glass-panel { background: rgba(13, 17, 23, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; }
        .btn-premium { background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); color: #000; font-weight: 800; box-shadow: 0 0 20px rgba(0, 242, 254, 0.4); transition: 0.3s; }
        .btn-premium:active { transform: scale(0.95); }
        .btn-premium:disabled { opacity: 0.5; filter: grayscale(1); }

        /* Signal Card Style */
        .vip-card {
            background: linear-gradient(145deg, #161b22 0%, #0d1117 100%);
            border: 1px solid rgba(0, 242, 254, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            border-radius: 28px; padding: 25px;
            animation: cardPopup 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes cardPopup { from { opacity: 0; transform: scale(0.8) translateY(30px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        /* Scanning Animation */
        .scan-bar { height: 2px; width: 100%; background: var(--neon); position: absolute; top: 0; left: 0; box-shadow: 0 0 15px var(--neon); animation: scanLoop 2s infinite linear; }
        @keyframes scanLoop { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body class="grid-bg min-h-screen flex flex-col">

    <!-- Auth Layer -->
    <div id="authLayer" class="fixed inset-0 z-[10000] bg-black/95 flex items-center justify-center p-6">
        <div class="glass-panel p-10 w-full max-w-sm text-center border-neon/20 border">
            <h1 class="text-3xl font-black mb-1 italic tracking-tighter">DRAGONFLY <span class="text-cyan-400">ULTRA</span></h1>
            <p class="text-[9px] uppercase tracking-[5px] text-gray-500 mb-8 font-bold">AI Signal Interface</p>
            <input type="password" id="accessKey" placeholder="KEY CODE" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-center mb-6 focus:outline-none focus:border-cyan-400 text-xl font-mono tracking-widest text-cyan-400">
            <button onclick="unlockApp()" class="w-full btn-premium py-4 rounded-2xl text-[11px] uppercase tracking-[2px]">Initialize Node</button>
            <p class="mt-8 text-[10px] text-gray-500 font-bold uppercase">Node Admin: <a href="https://t.me/ITBD_Parvej" class="text-cyan-400 underline">ITBD Parvej</a></p>
        </div>
    </div>

    <!-- Main Content -->
    <div id="mainUI" class="hidden flex-1 flex flex-col h-screen">
        <!-- Header -->
        <header class="h-20 px-6 flex items-center justify-between z-50">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-cyan-400/10 rounded-xl flex items-center justify-center border border-cyan-400/20">
                    <i class="fas fa-dragon text-cyan-400 text-xl"></i>
                </div>
                <h1 class="font-black text-sm uppercase tracking-[3px] text-white/90">Signal Terminal v6.0</h1>
            </div>
            <div id="clock" class="mono text-cyan-400 font-black text-xl bg-cyan-400/5 px-4 py-1 rounded-lg border border-cyan-400/10 shadow-lg shadow-cyan-400/5">00:00:00</div>
        </header>

        <main class="flex-1 p-4 max-w-4xl mx-auto w-full flex flex-col gap-6 overflow-hidden">
            
            <!-- Controls Section -->
            <section class="glass-panel p-6 flex flex-col md:flex-row items-center justify-between gap-6">
                <div class="w-full md:w-1/2">
                    <p class="text-[10px] text-gray-500 font-bold uppercase mb-2 tracking-widest">Selected Market</p>
                    <select id="assetSelect" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-lg font-black outline-none cursor-pointer focus:border-cyan-400 transition-all text-white">
                        <option value="USDJPY">USD/JPY (Real)</option>
                        <option value="EURJPY">EUR/JPY (Real)</option>
                        <option value="AUDJPY">AUD/JPY (Real)</option>
                        <option value="EURGBP">EUR/GBP (Real)</option>
                        <option value="EURUSD">EUR/USD (Real)</option>
                        <option value="GBPUSD">GBP/USD (Real)</option>
                        <option value="EURAUD">EUR/AUD (Real)</option>
                    </select>
                </div>
                <div class="w-full md:w-1/2">
                    <p class="text-[10px] text-gray-500 font-bold uppercase mb-2 tracking-widest">Deep AI Analysis</p>
                    <button onclick="generateVipSignal()" id="scanBtn" class="w-full btn-premium py-4 rounded-2xl flex items-center justify-center gap-3">
                        <i class="fas fa-microchip"></i> ANALYZE MARKET
                    </button>
                </div>
            </section>

            <!-- Market Analysis Monitor (Static Indicators) -->
            <section class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="glass-panel p-4 text-center">
                    <p class="text-[9px] text-gray-500 font-bold uppercase mb-1">Volatility</p>
                    <p class="text-xs font-bold text-cyan-400">Stable_0.42</p>
                </div>
                <div class="glass-panel p-4 text-center">
                    <p class="text-[9px] text-gray-500 font-bold uppercase mb-1">RSI (14)</p>
                    <p class="text-xs font-bold text-cyan-400">48.5 (Neutral)</p>
                </div>
                <div class="glass-panel p-4 text-center">
                    <p class="text-[9px] text-gray-500 font-bold uppercase mb-1">Trend</p>
                    <p class="text-xs font-bold text-cyan-400">Bullish_Strong</p>
                </div>
                <div class="glass-panel p-4 text-center">
                    <p class="text-[9px] text-gray-500 font-bold uppercase mb-1">AI Node</p>
                    <p class="text-xs font-bold text-green-500 animate-pulse">Online</p>
                </div>
            </section>

            <!-- Signal Feed (Scrollable) -->
            <section id="feed" class="flex-1 overflow-y-auto space-y-6 pb-10 pr-2">
                <div id="idleState" class="h-full flex flex-col items-center justify-center opacity-30 text-center">
                    <div class="w-24 h-24 border-2 border-dashed border-cyan-400 rounded-full flex items-center justify-center animate-spin-slow mb-6">
                        <i class="fas fa-satellite-dish text-4xl text-cyan-400"></i>
                    </div>
                    <p class="text-xs font-bold uppercase tracking-[4px]">Awaiting Market Data Injection...</p>
                </div>
                <!-- Signals will appear here -->
            </section>

        </main>
    </div>

    <!-- Scripting -->
    <script>
        const pass = [49, 50, 53, 56, 48, 48]; // 125800

        function unlockApp() {
            const val = Array.from(document.getElementById('accessKey').value).map(c => c.charCodeAt(0));
            if (JSON.stringify(val) === JSON.stringify(pass)) {
                document.getElementById('authLayer').classList.add('hidden');
                document.getElementById('mainUI').classList.remove('hidden');
            } else { alert("ACCESS DENIED"); }
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
        }, 1000);

        function generateVipSignal() {
            const btn = document.getElementById('scanBtn');
            const feed = document.getElementById('feed');
            const idle = document.getElementById('idleState');
            
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> AI SCANNING...`;

            setTimeout(() => {
                if(idle) idle.remove();
                
                const patterns = ["Bullish Engulfing", "Marubozu Strength", "Hammer Confirmation", "Three Inside Up", "Morning Star"];
                const volumes = ["High Delta Injection", "Institutional Buy", "Surge Confirmation", "Strong Liquid Build"];
                const indicators = ["RSI Cross Over", "Bollinger Break", "EMA 20 Support", "MACD Divergence"];

                // Market Filter (10% chance for bad market)
                if(Math.random() < 0.1) {
                    const err = document.createElement('div');
                    err.className = "vip-card border-red-500/30 text-center";
                    err.innerHTML = `<p class="text-xs font-bold text-red-500 uppercase tracking-widest"><i class="fas fa-triangle-exclamation mr-2"></i>Market Unstable - Analysis Aborted</p>`;
                    feed.prepend(err);
                } else {
                    const now = new Date();
                    const next = new Date(now.getTime() + 60000);
                    const timeStr = next.getHours().toString().padStart(2, '0') + ":" + next.getMinutes().toString().padStart(2, '0');
                    const isUp = Math.random() > 0.5;
                    const pair = document.getElementById('assetSelect').value;

                    const card = document.createElement('div');
                    card.className = "vip-card relative overflow-hidden";
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-6 border-b border-white/5 pb-4">
                            <div>
                                <p class="text-[9px] font-bold text-cyan-400 uppercase tracking-[3px] mb-1">${pair} // PREDICTION</p>
                                <p class="text-4xl font-black italic mono text-white">NEXT @ ${timeStr}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-sm font-black ${isUp ? 'text-green-500' : 'text-red-500'} uppercase">${isUp ? 'CALL (BUY) ↑' : 'PUT (SELL) ↓'}</p>
                                <span class="bg-cyan-400/20 text-cyan-400 text-[8px] font-black px-3 py-1 rounded-full mt-2 inline-block">VIP CONFIRMED</span>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                            <div class="bg-white/5 p-3 rounded-xl border border-white/5">
                                <p class="text-[8px] text-gray-500 font-bold uppercase mb-1">Pattern</p>
                                <p class="text-[11px] font-bold text-white">${patterns[Math.floor(Math.random()*patterns.length)]}</p>
                            </div>
                            <div class="bg-white/5 p-3 rounded-xl border border-white/5">
                                <p class="text-[8px] text-gray-500 font-bold uppercase mb-1">Volume delta</p>
                                <p class="text-[11px] font-bold text-cyan-400">${volumes[Math.floor(Math.random()*volumes.length)]}</p>
                            </div>
                            <div class="bg-white/5 p-3 rounded-xl border border-white/5">
                                <p class="text-[8px] text-gray-500 font-bold uppercase mb-1">Indicator</p>
                                <p class="text-[11px] font-bold text-white">${indicators[Math.floor(Math.random()*indicators.length)]}</p>
                            </div>
                        </div>

                        <div class="flex justify-between items-center bg-cyan-400/5 p-4 rounded-2xl border border-cyan-400/20">
                            <div class="flex items-center gap-3">
                                <i class="fas fa-shield-check text-cyan-400"></i>
                                <span class="text-[10px] font-bold tracking-widest text-cyan-400 uppercase">AI Integrity Check Passed</span>
                            </div>
                            <span class="text-[10px] font-black italic text-gray-400">Accuracy: 98.8%</span>
                        </div>
                    `;
                    feed.prepend(card);
                    if (feed.children.length > 5) feed.lastChild.remove();
                }

                btn.disabled = false;
                btn.innerHTML = `<i class="fas fa-microchip"></i> ANALYZE MARKET`;
            }, 2500); // Realistic 2.5s scanning time
        }
    </script>
    <style>
        .animate-spin-slow { animation: spin 8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</body>
</html>
