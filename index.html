<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRAGON FLY v5 // ULTRA-PRO TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #020406; --card: #0a0d12; --neon: #00f2fe; }
        body { 
            background-color: var(--bg); font-family: 'Outfit', sans-serif; color: #f1f5f9; margin: 0; min-height: 100vh; overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, rgba(0, 242, 254, 0.05) 0%, transparent 80%);
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass-panel { background: rgba(10, 13, 18, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; box-shadow: 0 10px 50px rgba(0,0,0,0.5); }
        .time-badge { background: linear-gradient(135deg, rgba(0, 242, 254, 0.1) 0%, rgba(0, 242, 254, 0.02) 100%); border: 1px solid rgba(0, 242, 254, 0.3); border-radius: 12px; padding: 8px 16px; }
        .btn-premium { background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); color: #000; font-weight: 900; box-shadow: 0 0 30px rgba(0, 242, 254, 0.4); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .btn-premium:disabled { background: #1e293b; color: #64748b; box-shadow: none; filter: grayscale(1); cursor: not-allowed; }
        .vip-signal-box { background: #0d1117; border: 1px solid rgba(0, 242, 254, 0.2); border-radius: 28px; padding: 24px; position: relative; animation: slideUp 0.6s cubic-bezier(0.19, 1, 0.22, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .conf-point { font-size: 9px; padding: 4px 10px; border-radius: 6px; background: rgba(0, 242, 254, 0.05); border: 1px solid rgba(0, 242, 254, 0.3); color: #00f2fe; text-transform: uppercase; font-weight: 700; }
        #assetSelect { background-color: #161b22 !important; color: #fff !important; border: 1px solid rgba(0, 242, 254, 0.4); border-radius: 12px; outline: none; padding: 15px; width: 100%; cursor: pointer; }
    </style>
</head>
<body class="p-2 md:p-6 flex flex-col items-center">

    <!-- Access Gating -->
    <div id="authGate" class="fixed inset-0 z-[10000] bg-black flex items-center justify-center p-6">
        <div class="glass-panel p-10 w-full max-w-sm text-center border-cyan-400/20 border">
            <div class="mb-6 inline-block p-4 bg-cyan-400/10 rounded-3xl border border-cyan-400/20">
                <i class="fas fa-bolt text-cyan-400 text-4xl"></i>
            </div>
            <h1 class="text-3xl font-black mb-1 italic tracking-tighter text-white">DRAGON FLY <span class="text-cyan-400">v5</span></h1>
            <p class="text-[9px] uppercase tracking-[5px] text-gray-500 mb-8 font-bold italic">S/R Analysis Terminal</p>
            <input type="password" id="pInput" placeholder="ROOT KEY" class="w-full bg-[#0d1117] border border-cyan-400/30 p-4 rounded-xl text-center mb-6 text-xl mono text-cyan-400 tracking-[10px] outline-none">
            <button onclick="checkPass()" class="w-full btn-premium py-4 rounded-xl text-xs uppercase tracking-[2px]">Initialize Node</button>
            <p class="mt-8 text-[10px] text-gray-400 uppercase tracking-widest text-center italic">Admin: <a href="https://t.me/ITBD_Parvej" target="_blank" class="text-cyan-400 font-bold underline">ITBD Parvej</a></p>
        </div>
    </div>

    <!-- Interface Content -->
    <div id="mainUI" class="hidden w-full max-w-xl flex flex-col gap-6">
        <header class="flex items-center justify-between py-4">
            <div class="flex items-center gap-3">
                <i class="fas fa-satellite text-cyan-400 animate-pulse"></i>
                <h1 class="text-xs font-black uppercase tracking-[3px]">Dragon Fly v5</h1>
            </div>
            <div id="clock" class="mono text-lg font-bold text-cyan-400 bg-cyan-400/10 px-4 py-1 rounded-xl border border-cyan-400/20 shadow-lg">00:00:00</div>
        </header>

        <section class="glass-panel p-6 shadow-2xl">
            <div class="mb-5">
                <p class="text-[10px] text-gray-500 font-bold uppercase mb-2 tracking-widest text-left">Target Asset Node</p>
                <select id="assetSelect" class="font-black text-lg">
                    <option value="USDJPY">USD/JPY (Real)</option>
                    <option value="EURJPY">EUR/JPY (Real)</option>
                    <option value="AUDJPY">AUD/JPY (Real)</option>
                    <option value="EURGBP">EUR/GBP (Real)</option>
                    <option value="EURUSD">EUR/USD (Real)</option>
                    <option value="GBPUSD">GBP/USD (Real)</option>
                    <option value="EURAUD">EUR/AUD (Real)</option>
                </select>
            </div>
            <button onclick="runLogic()" id="scanBtn" class="w-full btn-premium py-5 rounded-2xl flex items-center justify-center gap-4 text-sm">
                <i class="fas fa-brain"></i> RUN AI DEEP SCAN
            </button>
        </section>

        <!-- Node Stats -->
        <div class="grid grid-cols-2 gap-3">
            <div class="glass-panel p-3 text-center border-white/5">
                <p class="text-[8px] text-gray-500 uppercase mb-1">Price Action</p>
                <p class="text-[10px] font-bold text-green-500 uppercase animate-pulse italic">S/R_DETECTED_OK</p>
            </div>
            <div class="glass-panel p-3 text-center border-white/5">
                <p class="text-[8px] text-gray-500 uppercase mb-1">AI Node</p>
                <p class="text-[10px] font-bold text-cyan-400 uppercase italic tracking-tighter">Status: Active</p>
            </div>
        </div>

        <!-- Signal Display -->
        <section id="feed" class="flex flex-col gap-6 pb-20 text-center">
            <div id="idle" class="py-20 flex flex-col items-center justify-center opacity-20">
                <i class="fas fa-radar text-4xl mb-4 animate-pulse text-cyan-400"></i>
                <p class="text-[10px] font-bold uppercase tracking-[4px]">Scanning For S/R Rejections...</p>
            </div>
        </section>
    </div>

    <script>
        // Password: 125800
        function checkPass() {
            var input = document.getElementById('pInput').value;
            if (input === "125800") {
                document.getElementById('authGate').classList.add('hidden');
                document.getElementById('mainUI').classList.remove('hidden');
            } else {
                alert("ACCESS_DENIED: UNAUTHORIZED_ROOT_PASSWORD");
            }
        }

        // Live Clock
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
        }, 1000);

        function runLogic() {
            const btn = document.getElementById('scanBtn');
            const feed = document.getElementById('feed');
            const idle = document.getElementById('idle');
            
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-sync-alt fa-spin"></i> CALCULATING PRICE ACTION...`;
            feed.innerHTML = `<div class="py-10 animate-pulse text-cyan-400 text-[10px] font-bold uppercase tracking-widest italic text-center">Checking Support Rejection & Resistance Bounce...</div>`;

            setTimeout(() => {
                if(idle) idle.remove();
                feed.innerHTML = ""; 
                
                // মার্কেট কন্ডিশন চেক
                const marketHealth = Math.random(); 
                if (marketHealth < 0.40) {
                    const error = document.createElement('div');
                    error.className = "vip-signal-box border-red-500/20 text-center bg-red-500/5";
                    error.innerHTML = `<p class="text-[10px] font-bold text-red-500 uppercase tracking-widest italic"><i class="fas fa-shield-slash mr-2"></i>No Rejection Found at S/R Levels. Waiting for clear Price Action.</p>`;
                    feed.appendChild(error);
                    btn.disabled = false;
                    btn.innerHTML = `<i class="fas fa-brain"></i> RUN AI DEEP SCAN`;
                } else {
                    const now = new Date();
                    const nextMin = new Date(now.getTime() + 60000);
                    const tStr = nextMin.getHours().toString().padStart(2, '0') + ":" + nextMin.getMinutes().toString().padStart(2, '0');
                    
                    // Main Logic: S/R Rejection Simulation
                    const isUp = Math.random() > 0.5; // ৫০% চান্স সাপোর্ট অথবা রেজিস্ট্যান্স হওয়ার
                    const pair = document.getElementById('assetSelect').value;
                    
                    let srAnalysisText = "";
                    let srBadge = "";

                    if (isUp) {
                        // Support Rejection / Bounce
                        srAnalysisText = "Price rejected from Major Support. Bullish bounce confirmed.";
                        srBadge = "SUPPORT BOUNCE ↑";
                    } else {
                        // Resistance Rejection
                        srAnalysisText = "Price rejected from Resistance zone. Bearish reversal detected.";
                        srBadge = "RESISTANCE REJECTION ↓";
                    }

                    const card = document.createElement('div');
                    card.className = "vip-signal-box shadow-2xl text-left";
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-3">${pair} // LIVE SIGNAL</p>
                                <div class="time-badge inline-block mb-1">
                                    <span class="text-[10px] text-cyan-400 uppercase font-bold tracking-widest">NEXT @</span>
                                    <span class="text-3xl font-black italic text-white mono ml-2">${tStr}</span>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="text-xs font-black ${isUp ? 'text-green-500' : 'text-red-500'} uppercase">${isUp ? 'BUY (CALL) ↑' : 'SELL (PUT) ↓'}</p>
                                <div class="mt-2 text-right">
                                    <span class="text-[8px] bg-cyan-400/10 border border-cyan-400/30 px-3 py-1 rounded-full font-bold text-cyan-400 uppercase italic tracking-tighter">
                                        ${srBadge}
                                    </span>
                                </div>
                            </div>
                        </div>
                        <div class="mb-4">
                            <p class="text-[10px] text-gray-400 mono italic font-bold">
                                <i class="fas fa-info-circle mr-1 text-cyan-400"></i> ${srAnalysisText}
                            </p>
                        </div>
                        <div class="flex flex-wrap gap-2 mb-6">
                            <span class="conf-point">Trend: ${isUp ? 'Bullish' : 'Bearish'}</span>
                            <span class="conf-point">S/R: ${isUp ? 'Support' : 'Resistance'}</span>
                            <span class="conf-point">Rejection: Yes</span>
                            <span class="conf-point">Candle: Confirmed</span>
                            <span class="conf-point">Accuracy: 99.4%</span>
                        </div>
                        <div class="flex justify-between items-center p-4 bg-cyan-400/5 rounded-2xl border border-cyan-400/20">
                            <div class="flex items-center gap-3">
                                <div class="p-2 bg-cyan-400/20 rounded-lg"><i class="fas fa-check-double text-cyan-400"></i></div>
                                <div>
                                    <p class="text-[9px] font-black text-cyan-400 uppercase tracking-widest leading-none">Price Action Check Passed</p>
                                    <p class="text-[7px] text-gray-500 uppercase mt-1 italic">Dragon Node: Elite v5.2</p>
                                </div>
                            </div>
                            <i class="fas fa-bolt text-cyan-400/30"></i>
                        </div>
                    `;
                    feed.appendChild(card);
                    lockButton(60);
                }
                window.scrollTo({top: 0, behavior: 'smooth'});
            }, 2500);
        }

        function lockButton(seconds) {
            const btn = document.getElementById('scanBtn');
            let tLeft = seconds;
            const timer = setInterval(() => {
                btn.disabled = true;
                btn.innerHTML = `<i class="fas fa-lock mr-2"></i> ANALYZING MARKET (${tLeft}s)`;
                tLeft--;
                if (tLeft < 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.innerHTML = `<i class="fas fa-brain"></i> RUN AI DEEP SCAN`;
                }
            }, 1000);
        }
    </script>
</body>
</html>
