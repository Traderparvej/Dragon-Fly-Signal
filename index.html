<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRAGONFLY // SECURE_TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --cmd-green: #00ff41; --cmd-bg: #020202; }
        body { 
            background-color: var(--cmd-bg); 
            font-family: 'Fira Code', monospace; 
            color: var(--cmd-green); 
            margin: 0; 
            height: 100vh;
            overflow: hidden; 
        }

        /* Hacker Styling & 3D Effect */
        .glow { text-shadow: 0 0 15px var(--cmd-green); }
        .hacker-box { 
            border: 1px solid rgba(0, 255, 65, 0.3); 
            background: rgba(0, 255, 65, 0.02);
            box-shadow: inset 0 0 20px rgba(0, 255, 65, 0.05);
            border-radius: 4px;
        }

        /* Matrix Login */
        .auth-overlay {
            position: fixed; inset: 0; background: black; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .pass-input {
            background: transparent; border: 1px solid var(--cmd-green);
            padding: 15px; color: var(--cmd-green); width: 280px;
            text-align: center; outline: none; letter-spacing: 8px; font-size: 1.5rem;
        }

        /* Responsive Mobile Layout */
        @media (max-width: 1024px) {
            .container-grid { flex-direction: column; overflow-y: auto; height: auto; }
            .chart-view { height: 400px !important; min-height: 400px; }
            .signal-view { height: auto !important; min-height: 500px; }
            body { overflow-y: auto; }
        }

        /* Signal Animation */
        .signal-card {
            background: rgba(0, 255, 65, 0.08);
            border-left: 5px solid var(--cmd-green);
            margin-bottom: 12px; padding: 15px;
            transform: perspective(500px) rotateX(2deg);
            animation: emerge 0.4s ease-out;
        }
        @keyframes emerge { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        select option { background: #000; color: var(--cmd-green); }
    </style>
</head>
<body>

    <!-- Authentication -->
    <div id="authPanel" class="auth-overlay">
        <div class="text-center mb-10">
            <h1 class="glow text-4xl font-black uppercase tracking-[10px]">Dragonfly</h1>
            <p class="text-[10px] mt-2 opacity-50">BYPASSING_SECURITY_LAYER_V2...</p>
        </div>
        <input type="password" id="accessCode" placeholder="000000" class="pass-input mb-8">
        <button onclick="checkAccess()" class="border border-[#00ff41] px-12 py-3 hover:bg-[#00ff41] hover:text-black font-bold transition-all glow">INITIALIZE ACCESS</button>
        <div class="mt-20 text-[10px] text-center opacity-40">
            <p>ROOT_USER: ITBD_PARVEJ</p>
            <p><a href="https://t.me/ITBD_Parvej" class="text-white underline">@ITBD_Parvej</a></p>
        </div>
    </div>

    <!-- Main Terminal Interface -->
    <div id="terminalApp" class="hidden h-screen flex flex-col">
        <!-- System Bar -->
        <header class="h-14 border-b border-[#00ff41]/20 flex items-center justify-between px-6 bg-black">
            <div class="flex items-center gap-4">
                <i class="fas fa-microchip glow"></i>
                <span class="text-xs font-bold tracking-widest uppercase glow">Dragonfly: Real_Market_Monitor</span>
            </div>
            <div id="clock" class="text-sm font-mono text-white/80">00:00:00</div>
        </header>

        <main class="flex-1 flex flex-col lg:row container-grid p-3 gap-3">
            
            <!-- Left Panel: Market Control & Chart -->
            <div class="flex-[3] flex flex-col gap-3">
                <!-- Pair Selector -->
                <div class="hacker-box p-4 flex flex-wrap items-center justify-between gap-4">
                    <div class="flex items-center gap-3">
                        <span class="text-[10px] uppercase font-bold text-white/40 tracking-widest">Select_Target:</span>
                        <select id="marketPair" onchange="switchMarket()" class="bg-black border border-[#00ff41] text-xs p-2 outline-none">
                            <option value="FX:USDJPY">USD/JPY</option>
                            <option value="FX:EURJPY">EUR/JPY</option>
                            <option value="FX:AUDJPY">AUD/JPY</option>
                            <option value="FX:EURGBP">EUR/GBP</option>
                            <option value="FX:EURUSD">EUR/USD</option>
                            <option value="FX:GBPUSD">GBP/USD</option>
                            <option value="FX:EURAUD">EUR/AUD</option>
                        </select>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-[9px] bg-green-900/40 px-3 py-1 rounded text-green-400 font-bold uppercase">Signal_Sync: 100%</span>
                    </div>
                </div>

                <!-- Live Market Chart -->
                <div class="flex-1 hacker-box chart-view overflow-hidden">
                    <div id="tv-chart-container" class="h-full w-full"></div>
                </div>
            </div>

            <!-- Right Panel: Injection Signals -->
            <div class="flex-1 hacker-box flex flex-col signal-view min-h-[450px]">
                <div class="p-4 border-b border-[#00ff41]/20 bg-[#00ff41]/5 flex justify-between items-center">
                    <span class="text-xs font-bold uppercase tracking-widest">Live_Injections</span>
                    <span class="h-2 w-2 bg-green-500 rounded-full animate-pulse"></span>
                </div>
                
                <div id="signalFeed" class="flex-1 overflow-y-auto p-4 space-y-4">
                    <!-- Signals go here -->
                    <div class="text-[10px] opacity-20 text-center py-20">Awaiting market data injection...</div>
                </div>

                <!-- Footer Support -->
                <div class="p-4 border-t border-[#00ff41]/20">
                    <a href="https://t.me/ITBD_Parvej" target="_blank" class="block w-full text-center border border-[#00ff41]/40 py-3 text-[10px] font-bold hover:bg-[#00ff41] hover:text-black transition">
                        <i class="fab fa-telegram-plane mr-2"></i> TELEGRAM SUPPORT
                    </a>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // Password Protection (125800)
        const secretHash = [49, 50, 53, 56, 48, 48];

        function checkAccess() {
            const val = document.getElementById('accessCode').value;
            const codes = Array.from(val).map(c => c.charCodeAt(0));
            
            if (JSON.stringify(codes) === JSON.stringify(secretHash)) {
                document.getElementById('authPanel').classList.add('hidden');
                document.getElementById('terminalApp').classList.remove('hidden');
                switchMarket();
                initSignalEngine();
            } else {
                alert("ACCESS_DENIED: ROOT_PASSWORD_MISMATCH");
            }
        }

        // Clock Function
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
        }, 1000);

        // TradingView Initialization
        function switchMarket() {
            const symbol = document.getElementById('marketPair').value;
            new TradingView.widget({
                "autosize": true,
                "symbol": symbol,
                "interval": "1",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "container_id": "tv-chart-container",
                "hide_side_toolbar": false,
                "allow_symbol_change": false,
                "save_image": false
            });
        }

        // Signal Logic (Time + Direction)
        function generateSignal() {
            const pairSelect = document.getElementById('marketPair');
            const pairName = pairSelect.options[pairSelect.selectedIndex].text;
            const direction = Math.random() > 0.5 ? "UP" : "DOWN";
            const time = new Date().toLocaleTimeString('en-GB', {hour: '2-digit', minute:'2-digit'});

            const feed = document.getElementById('signalFeed');
            const card = document.createElement('div');
            const isUp = direction === "UP";

            card.className = "signal-card";
            card.style.borderLeftColor = isUp ? "#00ff88" : "#ff3333";
            
            card.innerHTML = `
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-[9px] text-white/40 uppercase tracking-widest">${pairName}</p>
                        <p class="text-xl font-black glow">${time}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xs font-bold ${isUp ? 'text-green-400' : 'text-red-500'} uppercase">${direction} ${isUp ? '↑' : '↓'}</p>
                        <p class="text-[8px] opacity-40">EXPIRY: 1 MIN</p>
                    </div>
                </div>
                <div class="mt-3 flex justify-between items-center border-t border-white/5 pt-2">
                    <span class="text-[8px] text-green-500 font-bold">CONFIRMATION: 98%</span>
                    <span class="text-[8px] bg-white/5 px-2 rounded">DATA_SYNC_OK</span>
                </div>
            `;

            if(feed.innerText.includes("Awaiting")) feed.innerHTML = "";
            feed.prepend(card);

            if(feed.children.length > 5) feed.lastChild.remove();
        }

        function initSignalEngine() {
            generateSignal();
            setInterval(generateSignal, 60000); // নতুন সিগন্যাল প্রতি মিনিটে
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</body>
</html>
