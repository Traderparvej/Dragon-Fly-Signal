<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRAGONFLY PRO // ADVANCED AI PREDICTOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #030508; font-family: 'Inter', sans-serif; color: #f1f5f9; overflow: hidden; }
        .glass { background: rgba(13, 17, 23, 0.95); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-premium { background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); }
        .btn-premium:active { transform: scale(0.96); }
        
        /* Mobile Optimization */
        @media (max-width: 1024px) {
            .mobile-view { flex-direction: column; overflow-y: auto; height: calc(100vh - 64px); }
            .chart-box { height: 400px !important; min-height: 400px; }
            .panel-box { min-height: 500px; }
            body { overflow-y: auto; }
        }

        .signal-card { border-left: 4px solid #2563eb; background: #161b22; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- Login -->
    <div id="loginGate" class="fixed inset-0 z-[10000] bg-black flex items-center justify-center p-6">
        <div class="glass p-8 rounded-3xl w-full max-w-md text-center shadow-2xl">
            <h1 class="text-3xl font-black mb-1 italic tracking-tighter">DRAGONFLY <span class="text-blue-500 font-bold">PRO</span></h1>
            <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-8 font-semibold">Real Market Next Candle Engine</p>
            <input type="password" id="passKey" placeholder="KEY CODE" class="w-full bg-black border border-white/10 p-4 rounded-xl text-center mb-6 focus:outline-none focus:border-blue-500 text-lg font-mono">
            <button onclick="login()" class="w-full btn-premium py-4 rounded-xl font-bold text-white uppercase tracking-widest">Initialise Access</button>
            <p class="mt-8 text-xs text-gray-400">Request Access: <a href="https://t.me/ITBD_Parvej" class="text-blue-500 font-bold">@ITBD_Parvej</a></p>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboardUI" class="hidden flex-1 flex flex-col h-screen">
        <header class="h-16 glass border-b border-white/5 flex items-center justify-between px-6">
            <div class="flex items-center gap-2">
                <i class="fas fa-dragon text-blue-500 text-xl"></i>
                <span class="font-extrabold text-xl tracking-tight italic uppercase">Dragonfly_v2.1</span>
            </div>
            <div id="liveTime" class="font-mono text-lg text-blue-400 font-black">00:00:00</div>
        </header>

        <div class="flex-1 flex mobile-view p-3 gap-3 overflow-hidden">
            <!-- Market Area -->
            <div class="flex-[3] flex flex-col gap-3">
                <div class="flex flex-col md:flex-row gap-3">
                    <div class="flex-1 glass p-4 rounded-2xl flex items-center justify-between">
                        <div>
                            <p class="text-[10px] text-gray-500 font-bold uppercase mb-1">Target Pair</p>
                            <select id="assetSelect" onchange="changeChart()" class="bg-transparent text-sm font-black outline-none cursor-pointer">
                                <option value="FX:USDJPY">USD/JPY</option>
                                <option value="FX:EURJPY">EUR/JPY</option>
                                <option value="FX:AUDJPY">AUD/JPY</option>
                                <option value="FX:EURGBP">EUR/GBP</option>
                                <option value="FX:EURUSD">EUR/USD</option>
                                <option value="FX:GBPUSD">GBP/USD</option>
                                <option value="FX:EURAUD">EUR/AUD</option>
                            </select>
                        </div>
                        <span class="text-[9px] bg-green-500/10 text-green-400 px-2 py-1 rounded-full font-bold">SYNC_OK</span>
                    </div>
                    <!-- Technical Gauge -->
                    <div class="flex-1 h-24 glass rounded-2xl overflow-hidden relative">
                        <div class="tradingview-widget-container">
                            <div class="tradingview-widget-container__widget"></div>
                            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                            {
                              "interval": "1m",
                              "width": "100%",
                              "isTransparent": true,
                              "height": "140",
                              "symbol": "FX:EURUSD",
                              "showIntervalTabs": false,
                              "displayMode": "single",
                              "locale": "en",
                              "colorTheme": "dark"
                            }
                            </script>
                        </div>
                    </div>
                </div>
                <!-- Advanced Chart -->
                <div id="chartFrame" class="flex-1 glass rounded-2xl overflow-hidden chart-box"></div>
            </div>

            <!-- Signal Console -->
            <div class="flex-1 flex flex-col gap-3 min-w-[320px] panel-box">
                <div class="glass p-5 rounded-2xl border-pro shadow-xl border border-blue-500/10">
                    <button onclick="analyseMarket()" id="scanBtn" class="w-full btn-premium py-4 rounded-xl font-bold flex items-center justify-center gap-3">
                        <i class="fas fa-robot"></i> ANALYZE MARKET
                    </button>
                    <p class="text-[9px] text-gray-500 mt-3 text-center italic tracking-widest">Predicts the Start of Next Candle</p>
                </div>

                <div id="signalContainer" class="flex-1 glass rounded-2xl p-4 overflow-y-auto space-y-3">
                    <div id="emptyMsg" class="text-center opacity-20 py-20 flex flex-col items-center">
                        <i class="fas fa-microchip text-4xl mb-3"></i>
                        <p class="text-xs font-bold uppercase">System Standby</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const key = [49, 50, 53, 56, 48, 48]; // 125800

        function login() {
            const input = Array.from(document.getElementById('passKey').value).map(c => c.charCodeAt(0));
            if (JSON.stringify(input) === JSON.stringify(key)) {
                document.getElementById('loginGate').style.display = 'none';
                document.getElementById('dashboardUI').classList.remove('hidden');
                changeChart();
            } else { alert("ACCESS DENIED"); }
        }

        setInterval(() => {
            document.getElementById('liveTime').innerText = new Date().toLocaleTimeString('en-GB');
        }, 1000);

        function changeChart() {
            const pair = document.getElementById('assetSelect').value;
            new TradingView.widget({
                "autosize": true,
                "symbol": pair,
                "interval": "1",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "container_id": "chartFrame",
                "hide_side_toolbar": false,
                "studies": ["Volume@tv-basicstudies", "RSI@tv-basicstudies"]
            });
        }

        function analyseMarket() {
            const btn = document.getElementById('scanBtn');
            const container = document.getElementById('signalContainer');
            
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> CALCULATING AI DATA...`;

            setTimeout(() => {
                // Market Stability Filter (Random simulation for stability)
                const marketHealth = Math.random();
                if (marketHealth < 0.15) {
                    const errorMsg = document.createElement('div');
                    errorMsg.className = "p-4 bg-red-500/10 border border-red-500/20 rounded-xl text-center";
                    errorMsg.innerHTML = `<p class="text-xs font-bold text-red-500 uppercase"><i class="fas fa-shield-halved"></i> Unstable Market - Trading Avoided</p>`;
                    container.prepend(errorMsg);
                } else {
                    // Logic for Next Candle Start Time
                    const now = new Date();
                    const nextCandleTime = new Date(now.getTime() + 60000);
                    const HHMM = nextCandleTime.getHours().toString().padStart(2, '0') + ":" + nextCandleTime.getMinutes().toString().padStart(2, '0');
                    
                    const direction = Math.random() > 0.5 ? "UP (CALL)" : "DOWN (PUT)";
                    const isUp = direction.includes("UP");
                    const pair = document.getElementById('assetSelect').options[document.getElementById('assetSelect').selectedIndex].text;

                    if (document.getElementById('emptyMsg')) document.getElementById('emptyMsg').remove();

                    const card = document.createElement('div');
                    card.className = "signal-card p-4 rounded-xl shadow-lg";
                    card.style.borderLeftColor = isUp ? "#10b981" : "#ef4444";
                    card.innerHTML = `
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="text-[9px] font-bold text-gray-500 uppercase">${pair}</p>
                                <p class="text-xl font-black italic">START @ ${HHMM}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-xs font-black ${isUp ? 'text-green-500' : 'text-red-500'} uppercase">${direction} ${isUp ? '↑' : '↓'}</p>
                                <span class="text-[8px] bg-blue-600 px-2 py-0.5 rounded-full font-bold uppercase mt-1 inline-block">1m Expiry</span>
                            </div>
                        </div>
                    `;
                    container.prepend(card);
                    if (container.children.length > 5) container.lastChild.remove();
                }

                btn.disabled = false;
                btn.innerHTML = `<i class="fas fa-robot"></i> ANALYZE MARKET`;
            }, 1800);
        }
    </script>
</body>
</html>
