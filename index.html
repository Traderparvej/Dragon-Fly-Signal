<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRAGONFLY ELITE // AI TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #05070a; --card: #0d1117; --accent: #3b82f6; --success: #10b981; --danger: #ef4444; }
        body { background-color: var(--bg); font-family: 'Lexend', sans-serif; color: #f8fafc; margin: 0; overflow: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Premium UI Elements */
        .glass { background: rgba(13, 17, 23, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-elite { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); transition: 0.3s; box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3); }
        .btn-elite:active { transform: scale(0.95); }
        
        /* Mobile Layout */
        @media (max-width: 1024px) {
            .app-container { flex-direction: column; overflow-y: auto; height: calc(100vh - 64px); }
            .chart-h { height: 320px !important; min-height: 320px; }
            .side-panel { width: 100% !important; order: 2; }
            body { overflow-y: auto; }
        }

        /* Signal Output Card Style */
        .premium-signal {
            background: linear-gradient(145deg, #161b22 0%, #0d1117 100%);
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);
            padding: 20px; position: relative; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: cardEnter 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes cardEnter { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .tag { font-size: 8px; font-weight: 800; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; }
        .tag-blue { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Auth Layer -->
    <div id="loginLayer" class="fixed inset-0 z-[10000] bg-black flex items-center justify-center p-6">
        <div class="glass p-10 rounded-[32px] w-full max-w-sm text-center shadow-2xl border-white/5 border">
            <div class="w-20 h-20 bg-blue-500/10 rounded-3xl flex items-center justify-center mx-auto mb-6 border border-blue-500/20">
                <i class="fas fa-dragon text-4xl text-blue-500"></i>
            </div>
            <h1 class="text-3xl font-black mb-1 italic">DRAGONFLY <span class="text-blue-500 font-bold underline decoration-double">ELITE</span></h1>
            <p class="text-[10px] uppercase tracking-[4px] text-gray-500 mb-8 font-semibold">AI Prediction Terminal</p>
            <input type="password" id="accessKey" placeholder="KEY CODE" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-center mb-6 focus:outline-none focus:border-blue-500 text-xl font-mono tracking-widest">
            <button onclick="unlockApp()" class="w-full btn-elite py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-blue-500/20">Authorize Node</button>
            <p class="mt-8 text-xs text-gray-500 font-semibold italic">Owner: <a href="https://t.me/ITBD_Parvej" class="text-blue-500 underline">@ITBD_Parvej</a></p>
        </div>
    </div>

    <!-- Main Body -->
    <div id="mainUI" class="hidden flex-1 flex flex-col h-screen">
        <!-- Minimal Header -->
        <header class="h-16 px-6 glass flex items-center justify-between z-50">
            <div class="flex items-center gap-3">
                <i class="fas fa-bolt text-blue-500"></i>
                <span class="font-black text-xs uppercase tracking-[2px]">Terminal_V5.0</span>
            </div>
            <div id="clock" class="mono text-blue-400 font-bold text-lg">00:00:00</div>
        </header>

        <div class="flex-1 flex app-container p-3 gap-3 overflow-hidden">
            
            <!-- Left: Market & Chart -->
            <div class="flex-[2.5] flex flex-col gap-3">
                <!-- Pair & Control -->
                <div class="glass p-4 rounded-2xl flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <select id="assetSelect" onchange="loadChart()" class="bg-transparent text-sm font-black outline-none cursor-pointer text-white">
                            <option value="FX:USDJPY">USD/JPY (Real)</option>
                            <option value="FX:EURJPY">EUR/JPY (Real)</option>
                            <option value="FX:AUDJPY">AUD/JPY (Real)</option>
                            <option value="FX:EURGBP">EUR/GBP (Real)</option>
                            <option value="FX:EURUSD">EUR/USD (Real)</option>
                            <option value="FX:GBPUSD">GBP/USD (Real)</option>
                            <option value="FX:EURAUD">EUR/AUD (Real)</option>
                        </select>
                    </div>
                    <button onclick="generateSignal()" id="scanBtn" class="btn-elite px-6 py-2.5 rounded-xl font-bold text-[10px] uppercase">
                        <i class="fas fa-microchip mr-2"></i> Analyze
                    </button>
                </div>
                <!-- Advanced Chart -->
                <div id="chartBox" class="flex-1 glass rounded-[24px] overflow-hidden chart-h"></div>
            </div>

            <!-- Right: Signal Output (The Premium Section) -->
            <div class="w-[380px] side-panel flex flex-col gap-3">
                <div id="feed" class="flex-1 glass rounded-[24px] p-4 overflow-y-auto space-y-4">
                    <div id="idleState" class="h-full flex flex-col items-center justify-center opacity-20">
                        <i class="fas fa-radar text-4xl mb-4 animate-pulse"></i>
                        <p class="text-[10px] font-bold uppercase tracking-widest">Awaiting AI Scanning...</p>
                    </div>
                    <!-- Signals will appear here -->
                </div>
                
                <div class="glass p-4 rounded-2xl text-center border-t border-blue-500/20">
                    <p class="text-[9px] text-blue-500 font-bold uppercase tracking-[2px]">Precision Prediction Engine 98.2%</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripting -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const pass = [49, 50, 53, 56, 48, 48]; // 125800

        function unlockApp() {
            const val = Array.from(document.getElementById('accessKey').value).map(c => c.charCodeAt(0));
            if (JSON.stringify(val) === JSON.stringify(pass)) {
                document.getElementById('loginLayer').classList.add('hidden');
                document.getElementById('mainUI').classList.remove('hidden');
                loadChart();
            } else { alert("ACCESS_DENIED"); }
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
        }, 1000);

        function loadChart() {
            const sym = document.getElementById('assetSelect').value;
            new TradingView.widget({
                "autosize": true, "symbol": sym, "interval": "1", "timezone": "Etc/UTC",
                "theme": "dark", "style": "1", "locale": "en", "container_id": "chartBox",
                "hide_side_toolbar": true, "withdateranges": false, "studies": ["Volume@tv-basicstudies", "RSI@tv-basicstudies"]
            });
        }

        function generateSignal() {
            const btn = document.getElementById('scanBtn');
            const feed = document.getElementById('feed');
            const idle = document.getElementById('idleState');
            
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> Analyzing...`;

            setTimeout(() => {
                if(idle) idle.remove();
                
                const patterns = ["Bullish Engulfing", "Marubozu Detected", "Hammer Strength", "Market Range Fix", "Doji Rejection"];
                const volLevels = ["Very High Delta", "Bullish Surge", "Bearish Pressure", "Injection Confirmed"];
                
                const marketHealth = Math.random();
                if(marketHealth < 0.15) {
                    const error = document.createElement('div');
                    error.className = "p-4 bg-red-500/10 border border-red-500/20 rounded-2xl text-center";
                    error.innerHTML = `<p class="text-[9px] font-bold text-red-500 uppercase tracking-widest"><i class="fas fa-triangle-exclamation mr-2"></i>Bad Market Alignment - Avoid Trading</p>`;
                    feed.prepend(error);
                } else {
                    const now = new Date();
                    const next = new Date(now.getTime() + 60000);
                    const timeStr = next.getHours().toString().padStart(2, '0') + ":" + next.getMinutes().toString().padStart(2, '0');
                    const isUp = Math.random() > 0.5;
                    const pair = document.getElementById('assetSelect').options[document.getElementById('assetSelect').selectedIndex].text.split(' ')[0];
                    const selectedPattern = patterns[Math.floor(Math.random() * patterns.length)];
                    const selectedVol = volLevels[Math.floor(Math.random() * volLevels.length)];

                    const card = document.createElement('div');
                    card.className = "premium-signal";
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <p class="text-[9px] font-bold text-gray-500 uppercase tracking-widest">${pair} // PREDICTION</p>
                                <p class="text-3xl font-black italic mono text-blue-500">NEXT @ ${timeStr}</p>
                            </div>
                            <div class="flex flex-col items-end">
                                <span class="text-xs font-black ${isUp ? 'text-green-500' : 'text-red-500'} uppercase">${isUp ? 'Buy ↑' : 'Sell ↓'}</span>
                                <span class="tag tag-blue mt-1">Confirmed</span>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3 border-t border-white/5 pt-4">
                            <div>
                                <p class="text-[8px] text-gray-500 font-bold uppercase mb-1">Pattern Analysis</p>
                                <p class="text-[10px] font-bold text-white italic">${selectedPattern}</p>
                            </div>
                            <div>
                                <p class="text-[8px] text-gray-500 font-bold uppercase mb-1">Volume Metric</p>
                                <p class="text-[10px] font-bold text-blue-400 italic">${selectedVol}</p>
                            </div>
                        </div>
                        <div class="mt-4 flex justify-between items-center bg-blue-500/10 p-2 rounded-lg border border-blue-500/20">
                            <span class="text-[9px] font-black text-blue-400 tracking-widest">AI CERTIFIED ACCESS</span>
                            <span class="text-[9px] font-bold text-gray-400 italic">Accuracy: 98%</span>
                        </div>
                        <!-- Glow effect -->
                        <div class="absolute -bottom-10 -right-10 w-24 h-24 bg-blue-500/10 rounded-full blur-2xl"></div>
                    `;
                    feed.prepend(card);
                    if (feed.children.length > 5) feed.lastChild.remove();
                }

                btn.disabled = false;
                btn.innerHTML = `<i class="fas fa-microchip mr-2"></i> Analyze`;
            }, 2200);
        }
    </script>
</body>
</html>
