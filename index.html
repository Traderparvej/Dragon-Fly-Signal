<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRAGONFLY PRO MAX // NEXT GEN PREDICT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #05070a; font-family: 'Inter', sans-serif; color: #f8fafc; overflow: hidden; }
        .bg-dark-pro { background: #0d1117; }
        .border-pro { border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-gradient { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); transition: all 0.3s; }
        .btn-gradient:active { transform: scale(0.95); }
        
        @media (max-width: 1024px) {
            .mobile-stack { flex-direction: column; overflow-y: auto; height: calc(100vh - 64px); }
            .chart-h { height: 400px !important; }
            body { overflow-y: auto; }
        }

        .signal-card { border-left: 4px solid #3b82f6; background: #161b22; animation: popUp 0.3s ease; }
        @keyframes popUp { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Login -->
    <div id="loginGate" class="fixed inset-0 z-[10000] bg-black flex items-center justify-center p-6">
        <div class="bg-dark-pro p-10 rounded-3xl w-full max-w-md border-pro text-center shadow-2xl">
            <h1 class="text-4xl font-extrabold mb-2 tracking-tighter italic">DRAGONFLY <span class="text-blue-500">MAX</span></h1>
            <p class="text-xs text-gray-500 uppercase tracking-widest mb-8">AI NEXT CANDLE PREDICTION</p>
            <input type="password" id="pKey" placeholder="LICENSE KEY" class="w-full bg-black/50 border border-white/10 p-4 rounded-xl text-center mb-6 focus:outline-none focus:border-blue-500 text-lg">
            <button onclick="access()" class="w-full btn-gradient py-4 rounded-xl font-bold text-white shadow-lg">INITIALIZE SYSTEM</button>
            <p class="mt-8 text-xs text-gray-400">Owner: <a href="https://t.me/ITBD_Parvej" class="text-blue-500 font-bold">@ITBD_Parvej</a></p>
        </div>
    </div>

    <!-- Main View -->
    <div id="mainUI" class="hidden flex-1 flex flex-col h-screen">
        <!-- Header -->
        <header class="h-16 bg-dark-pro border-b border-white/5 flex items-center justify-between px-6 shadow-md">
            <div class="flex items-center gap-2">
                <i class="fas fa-bolt text-blue-500 text-xl"></i>
                <span class="font-black text-xl tracking-tight italic uppercase">DRAGONFLY_V.3</span>
            </div>
            <div id="timeClock" class="font-mono text-xl text-blue-400 font-bold">00:00:00</div>
        </header>

        <div class="flex-1 flex mobile-stack p-3 gap-3 overflow-hidden">
            <!-- Left: Chart & Gauge -->
            <div class="flex-[3] flex flex-col gap-3">
                <div class="flex flex-col md:flex-row gap-3">
                    <!-- Selector -->
                    <div class="flex-1 bg-dark-pro p-4 rounded-2xl border-pro flex items-center justify-between">
                        <select id="curPair" onchange="resetChart()" class="bg-transparent text-sm font-bold outline-none cursor-pointer">
                            <option value="FX:USDJPY">USD/JPY</option>
                            <option value="FX:EURJPY">EUR/JPY</option>
                            <option value="FX:AUDJPY">AUD/JPY</option>
                            <option value="FX:EURGBP">EUR/GBP</option>
                            <option value="FX:EURUSD">EUR/USD</option>
                            <option value="FX:GBPUSD">GBP/USD</option>
                            <option value="FX:EURAUD">EUR/AUD</option>
                        </select>
                        <span class="text-[10px] bg-green-500/10 text-green-400 px-2 py-1 rounded font-bold uppercase">Live Sync</span>
                    </div>
                    <!-- Volume Gauge Container -->
                    <div class="flex-1 h-20 bg-dark-pro rounded-2xl border-pro overflow-hidden">
                        <!-- TradingView Single Gauge Widget -->
                        <div class="tradingview-widget-container">
                            <div class="tradingview-widget-container__widget"></div>
                            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                            {
                              "interval": "1m",
                              "width": "100%",
                              "isTransparent": true,
                              "height": 130,
                              "symbol": "FX:EURUSD",
                              "showIntervalTabs": false,
                              "displayMode": "single",
                              "locale": "en",
                              "colorTheme": "dark"
                            }
                            </script>
                        </div>
                    </div>
                </div>
                <!-- Main Chart -->
                <div id="chartContainer" class="flex-1 bg-dark-pro rounded-2xl border-pro overflow-hidden chart-h"></div>
            </div>

            <!-- Right: Signal Panel -->
            <div class="flex-1 flex flex-col gap-3 min-w-[320px]">
                <div class="bg-dark-pro p-5 rounded-2xl border-pro shadow-xl">
                    <h3 class="text-xs font-bold text-blue-500 uppercase tracking-widest mb-4">Manual Analysis</h3>
                    <button onclick="getSignal()" id="genBtn" class="w-full btn-gradient py-4 rounded-xl font-bold flex items-center justify-center gap-3">
                        <i class="fas fa-brain"></i> START SCANNING
                    </button>
                    <p class="text-[9px] text-gray-500 mt-2 text-center uppercase tracking-tighter italic">Always predicts for the next 1m candle</p>
                </div>

                <div id="sigFeed" class="flex-1 bg-dark-pro rounded-2xl border-pro p-4 overflow-y-auto space-y-3">
                    <div id="initial" class="text-center opacity-20 py-20 flex flex-col items-center">
                        <i class="fas fa-radar text-4xl mb-3"></i>
                        <p class="text-xs font-bold">READY TO ANALYZE</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const key = [49, 50, 53, 56, 48, 48]; // 125800

        function access() {
            const input = Array.from(document.getElementById('pKey').value).map(c => c.charCodeAt(0));
            if (JSON.stringify(input) === JSON.stringify(key)) {
                document.getElementById('loginGate').style.display = 'none';
                document.getElementById('mainUI').classList.remove('hidden');
                resetChart();
            } else { alert("ACCESS DENIED"); }
        }

        setInterval(() => {
            document.getElementById('timeClock').innerText = new Date().toLocaleTimeString('en-GB');
        }, 1000);

        function resetChart() {
            const pair = document.getElementById('curPair').value;
            new TradingView.widget({
                "autosize": true,
                "symbol": pair,
                "interval": "1",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "container_id": "chartContainer",
                "hide_top_toolbar": false,
                "studies": ["Volume@tv-basicstudies"]
            });
        }

        function getSignal() {
            const btn = document.getElementById('genBtn');
            const feed = document.getElementById('sigFeed');
            
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> CALCULATING...`;

            setTimeout(() => {
                // Market Stability Check (Random Logic for Demo)
                const stability = Math.random();
                if (stability < 0.2) {
                    const errorCard = document.createElement('div');
                    errorCard.className = "p-4 bg-red-500/10 border border-red-500/20 rounded-xl text-center";
                    errorCard.innerHTML = `<p class="text-xs font-bold text-red-500 uppercase"><i class="fas fa-exclamation-triangle"></i> Market Unstable - Avoid Trading</p>`;
                    feed.prepend(errorCard);
                } else {
                    const now = new Date();
                    const nextMin = new Date(now.getTime() + 60000);
                    const timeStr = nextMin.getHours().toString().padStart(2, '0') + ":" + nextMin.getMinutes().toString().padStart(2, '0');
                    const isUp = Math.random() > 0.5;
                    const pair = document.getElementById('curPair').options[document.getElementById('curPair').selectedIndex].text;

                    if (document.getElementById('initial')) document.getElementById('initial').remove();

                    const card = document.createElement('div');
                    card.className = "signal-card p-4 rounded-xl shadow-lg";
                    card.style.borderLeftColor = isUp ? "#10b981" : "#ef4444";
                    card.innerHTML = `
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="text-[10px] font-bold text-gray-500 uppercase">${pair}</p>
                                <p class="text-xl font-black italic">NEXT @ ${timeStr}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-xs font-bold ${isUp ? 'text-green-500' : 'text-red-500'}">${isUp ? 'CALL (BUY) ↑' : 'PUT (SELL) ↓'}</p>
                                <p class="text-[9px] bg-blue-500 text-white px-2 py-0.5 rounded-full mt-1">PRO CONFIRMED</p>
                            </div>
                        </div>
                    `;
                    feed.prepend(card);
                    if (feed.children.length > 6) feed.lastChild.remove();
                }

                btn.disabled = false;
                btn.innerHTML = `<i class="fas fa-brain"></i> START SCANNING`;
            }, 1500);
        }
    </script>
</body>
</html>
