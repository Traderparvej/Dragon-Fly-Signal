<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRAGON FLY v5 // ULTRA-PRO TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #020406; --card: #0a0d12; --neon: #00f2fe; }
        body { 
            background-color: var(--bg); font-family: 'Outfit', sans-serif; color: #f1f5f9; margin: 0; min-height: 100vh; overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, rgba(0, 242, 254, 0.05) 0%, transparent 80%);
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass-panel { background: rgba(10, 13, 18, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; box-shadow: 0 10px 50px rgba(0,0,0,0.5); }
        .time-badge { background: linear-gradient(135deg, rgba(0, 242, 254, 0.1) 0%, rgba(0, 242, 254, 0.02) 100%); border: 1px solid rgba(0, 242, 254, 0.3); border-radius: 12px; padding: 8px 16px; }
        .btn-premium { background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); color: #000; font-weight: 900; box-shadow: 0 0 30px rgba(0, 242, 254, 0.4); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .btn-premium:disabled { background: #1e293b; color: #64748b; box-shadow: none; filter: grayscale(1); cursor: not-allowed; }
        .vip-signal-box { background: #0d1117; border: 1px solid rgba(0, 242, 254, 0.2); border-radius: 28px; padding: 24px; position: relative; animation: slideDown 0.5s cubic-bezier(0.19, 1, 0.22, 1); }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        .conf-point { font-size: 9px; padding: 4px 10px; border-radius: 6px; background: rgba(0, 242, 254, 0.05); border: 1px solid rgba(0, 242, 254, 0.3); color: #00f2fe; text-transform: uppercase; font-weight: 700; }
        #assetSelect { background-color: #161b22 !important; color: #fff !important; border: 1px solid rgba(0, 242, 254, 0.4); border-radius: 12px; outline: none; padding: 15px; width: 100%; cursor: pointer; }
        
        /* TradingView Mini Container */
        #chart-container { width: 100%; height: 150px; border-radius: 15px; overflow: hidden; border: 1px solid rgba(0, 242, 254, 0.2); margin-bottom: 15px; }

        .pop-enter { opacity: 1 !important; pointer-events: auto !important; }
        .pop-scale { transform: scale(1) !important; }
    </style>
</head>
<body class="p-2 md:p-6 flex flex-col items-center">

    <!-- Telegram Popup -->
    <div id="tgPopup" class="fixed inset-0 z-[20000] bg-black/80 backdrop-blur-md flex items-center justify-center p-6 opacity-0 pointer-events-none transition-opacity duration-500">
        <div id="tgPopupCard" class="glass-panel p-8 w-full max-w-sm text-center border-cyan-400/40 border relative transform scale-90 transition-transform duration-500">
            <div class="mb-5 inline-block p-4 bg-cyan-400/10 rounded-full border border-cyan-400/30 animate-pulse">
                <i class="fab fa-telegram-plane text-cyan-400 text-5xl"></i>
            </div>
            <h2 class="text-2xl font-black mb-2 tracking-tighter text-white uppercase italic">Join ITBD Dev Core</h2>
            <p class="text-[11px] text-gray-400 mb-8 tracking-widest leading-relaxed">To get the <span class="text-cyan-400 font-bold">Root Key</span> & latest updates, join our official Telegram.</p>
            <a href="https://t.me/addlist/uzPkdhs-r-BjOGZl" target="_blank" onclick="closeTgPopup()" class="block w-full btn-premium py-4 rounded-xl text-xs uppercase tracking-[2px] mb-3">Join Channel Now</a>
            <button onclick="closeTgPopup()" class="w-full py-3 rounded-xl text-[10px] uppercase tracking-[2px] text-gray-500 hover:text-cyan-400 bg-white/5">I Already Joined</button>
        </div>
    </div>

    <!-- Access Gating -->
    <div id="authGate" class="fixed inset-0 z-[10000] bg-black flex items-center justify-center p-6">
        <div class="glass-panel p-10 w-full max-w-sm text-center border-cyan-400/20 border">
            <div class="mb-6 inline-block p-4 bg-cyan-400/10 rounded-3xl border border-cyan-400/20"><i class="fas fa-bolt text-cyan-400 text-4xl"></i></div>
            <h1 class="text-3xl font-black mb-1 italic tracking-tighter text-white">DRAGON FLY <span class="text-cyan-400">v5</span></h1>
            <input type="password" id="pInput" placeholder="ROOT KEY" class="w-full bg-[#0d1117] border border-cyan-400/30 p-4 rounded-xl text-center mb-6 text-xl mono text-cyan-400 tracking-[10px] outline-none">
            <button onclick="checkPass()" class="w-full btn-premium py-4 rounded-xl text-xs uppercase tracking-[2px]">Initialize Node</button>
        </div>
    </div>

    <!-- Interface Content -->
    <div id="mainUI" class="hidden w-full max-w-xl flex flex-col gap-6">
        <header class="flex items-center justify-between py-4">
            <div class="flex items-center gap-3">
                <i class="fas fa-satellite text-cyan-400 animate-pulse"></i>
                <h1 class="text-xs font-black uppercase tracking-[3px]">Dragon Fly v5</h1>
            </div>
            <div id="clock" class="mono text-lg font-bold text-cyan-400 bg-cyan-400/10 px-4 py-1 rounded-xl border border-cyan-400/20 shadow-lg">00:00:00</div>
        </header>

        <section class="glass-panel p-6 shadow-2xl">
            <!-- Mini Chart Section -->
            <div id="chart-container">
                <div id="tradingview_widget"></div>
            </div>

            <div class="mb-5">
                <p class="text-[10px] text-gray-500 font-bold uppercase mb-2 tracking-widest">Target Asset Node</p>
                <select id="assetSelect" class="font-black text-lg" onchange="updateChart()">
                    <option value="FX:USDJPY">USD/JPY (Real)</option>
                    <option value="FX:EURJPY">EUR/JPY (Real)</option>
                    <option value="FX:AUDJPY">AUD/JPY (Real)</option>
                    <option value="FX:EURGBP">EUR/GBP (Real)</option>
                    <option value="FX:EURUSD">EUR/USD (Real)</option>
                    <option value="FX:GBPUSD">GBP/USD (Real)</option>
                    <option value="FX:EURAUD">EUR/AUD (Real)</option>
                </select>
            </div>
            <button onclick="runLogic()" id="scanBtn" class="w-full btn-premium py-5 rounded-2xl flex items-center justify-center gap-4 text-sm">
                <i class="fas fa-brain"></i> RUN AI DEEP SCAN
            </button>
        </section>

        <!-- Node Stats -->
        <div class="grid grid-cols-2 gap-3">
            <div class="glass-panel p-3 text-center border-white/5">
                <p class="text-[8px] text-gray-500 uppercase mb-1">Price Action</p>
                <p class="text-[10px] font-bold text-green-500 uppercase animate-pulse italic">S/R_DETECTED_OK</p>
            </div>
            <div class="glass-panel p-3 text-center border-white/5">
                <p class="text-[8px] text-gray-500 uppercase mb-1">AI Node</p>
                <p class="text-[10px] font-bold text-cyan-400 uppercase italic tracking-tighter">Status: Active</p>
            </div>
        </div>

        <section id="feed" class="flex flex-col gap-4 pb-20 text-center">
            <div id="idle" class="py-20 flex flex-col items-center justify-center opacity-20">
                <i class="fas fa-radar text-4xl mb-4 animate-pulse text-cyan-400"></i>
                <p class="text-[10px] font-bold uppercase tracking-[4px]">Scanning For S/R Rejections...</p>
            </div>
        </section>
    </div>

    <!-- TradingView Widget Script -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>

    <script>
        // Password Check
        function checkPass() {
            var input = document.getElementById('pInput').value;
            if (input === "125800") {
                document.getElementById('authGate').classList.add('hidden');
                document.getElementById('mainUI').classList.remove('hidden');
                updateChart(); // Load chart after login
            } else {
                alert("ACCESS_DENIED");
            }
        }

        // TradingView Chart Logic (Professional Mini View)
        function updateChart() {
            const symbol = document.getElementById('assetSelect').value;
            new TradingView.widget({
                "autosize": true,
                "symbol": symbol,
                "interval": "1",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "hide_top_toolbar": true,
                "hide_legend": true,
                "save_image": false,
                "container_id": "tradingview_widget",
                "backgroundColor": "rgba(10, 13, 18, 1)",
                "gridColor": "rgba(0, 242, 254, 0.05)",
                "hide_volume": true
            });
        }

        // Live Clock
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
        }, 1000);

        let lastSignalTime = null;

        function runLogic() {
            const btn = document.getElementById('scanBtn');
            const feed = document.getElementById('feed');
            const idle = document.getElementById('idle');
            
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-sync-alt fa-spin"></i> SCANNING MARKET...`;

            const tempId = 'temp-' + Date.now();
            const tempScanMsg = document.createElement('div');
            tempScanMsg.id = tempId;
            tempScanMsg.className = "py-6 animate-pulse text-cyan-400 text-[10px] font-bold uppercase tracking-widest italic text-center border border-cyan-400/20 rounded-2xl bg-cyan-400/5";
            tempScanMsg.innerText = "Checking Support Rejection & Resistance Bounce...";
            feed.prepend(tempScanMsg);

            setTimeout(() => {
                if(idle) idle.remove();
                const temp = document.getElementById(tempId);
                if(temp) temp.remove();
                
                // Market Condition Logic
                const marketHealth = Math.random(); 
                if (marketHealth < 0.25) { // 25% chance of avoiding bad signals
                    const errorCard = document.createElement('div');
                    errorCard.className = "vip-signal-box border-red-500/20 text-center bg-red-500/5 mb-4";
                    errorCard.innerHTML = `<p class="text-[10px] font-bold text-red-500 uppercase tracking-widest italic"><i class="fas fa-shield-slash mr-2"></i>Bad Market Detected. Avoiding Signal.</p>`;
                    feed.prepend(errorCard);
                    setTimeout(() => errorCard.remove(), 4000);
                    
                    // Reset Button Instantly
                    btn.disabled = false;
                    btn.innerHTML = `<i class="fas fa-brain"></i> RUN AI DEEP SCAN`;
                } else {
                    const now = new Date();
                    const gapMinutes = Math.floor(Math.random() * 3) + 1; 

                    if (lastSignalTime && lastSignalTime > now) {
                        lastSignalTime = new Date(lastSignalTime.getTime() + (gapMinutes * 60000));
                    } else {
                        lastSignalTime = new Date(now.getTime() + (gapMinutes * 60000));
                    }

                    const tStr = lastSignalTime.getHours().toString().padStart(2, '0') + ":" + lastSignalTime.getMinutes().toString().padStart(2, '0');
                    const isUp = Math.random() > 0.5;
                    const pair = document.getElementById('assetSelect').options[document.getElementById('assetSelect').selectedIndex].text;
                    
                    const card = document.createElement('div');
                    card.className = "signal-item vip-signal-box shadow-2xl text-left mb-4";
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <p class="text-[9px] font-black text-gray-500 uppercase tracking-widest mb-2">${pair}</p>
                                <div class="time-badge inline-block"><span class="text-2xl font-black italic text-white mono">${tStr}</span></div>
                            </div>
                            <div class="text-right">
                                <p class="text-xs font-black ${isUp ? 'text-green-500' : 'text-red-500'} uppercase">${isUp ? 'CALL ↑' : 'PUT ↓'}</p>
                                <span class="text-[8px] bg-cyan-400/10 border border-cyan-400/30 px-2 py-1 rounded-full font-bold text-cyan-400 uppercase">99.4% ACCURACY</span>
                            </div>
                        </div>
                    `;
                    feed.prepend(card);
                    maintainHistory();
                    
                    // Reset Button Instantly
                    btn.disabled = false;
                    btn.innerHTML = `<i class="fas fa-brain"></i> RUN AI DEEP SCAN`;
                }
            }, 2000);
        }

        function maintainHistory() {
            const signals = document.getElementsByClassName('signal-item');
            if (signals.length > 5) signals[signals.length - 1].remove();
        }

        function closeTgPopup() {
            document.getElementById('tgPopup').classList.remove('pop-enter');
        }

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('tgPopup').classList.add('pop-enter');
                document.getElementById('tgPopupCard').classList.add('pop-scale');
            }, 500);
        });
    </script>
</body>
</html>
